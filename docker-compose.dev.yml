# Lokální dev prostředí: Postgres + MinIO + Mailhog
# Spusť: docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: cointrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cointrack
      POSTGRES_USER: cointrack
      POSTGRES_PASSWORD: cointrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cointrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cointrack-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cointrack
      MINIO_ROOT_PASSWORD: cointrack123
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web konzole
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Po prvním spuštění vytvoří bucket "cointrack-files"
  minio-init:
    image: minio/mc:latest
    container_name: cointrack-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 cointrack cointrack123 &&
      /usr/bin/mc mb --ignore-existing local/cointrack-files &&
      echo 'MinIO bucket ready.'
      "

  mailhog:
    image: mailhog/mailhog:latest
    container_name: cointrack-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"    # SMTP
      - "8025:8025"    # Web UI

volumes:
  postgres_data:
  minio_data:
